name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright==1.44.0 customtkinter==5.2.2 pyinstaller==6.8.0 instagrapi==2.1.3

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Build with PyInstaller
        run: pyinstaller --onedir --windowed --name instagram-detector --collect-all customtkinter --collect-all playwright main.py

      - name: Bundle Chromium into dist
        shell: pwsh
        run: |
          $src = "$env:LOCALAPPDATA\ms-playwright"
          $dst = "dist\instagram-detector\pw-browsers"
          Copy-Item -Recurse -Force $src $dst

      - name: Zip dist folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\instagram-detector\*" -DestinationPath "instagram-detector-windows.zip"

      # Actions Artifact (90일 보관 — 테스트용)
      - uses: actions/upload-artifact@v4
        with:
          name: instagram-detector-windows
          path: instagram-detector-windows.zip
          retention-days: 90

      # GitHub Release에 zip 첨부 (태그 푸시 시에만)
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: instagram-detector-windows.zip
          body: |
            ## 다운로드

            👉 **instagram-detector-windows.zip** 을 받아서 압축 해제 후 `instagram-detector.exe` 실행

            ### 요구사항
            - Windows 10 / 11 (64-bit)
            - 별도 설치 불필요 (Python, Chromium 내장)

            ### 공식 배포처
            https://hoonzeee.github.io
